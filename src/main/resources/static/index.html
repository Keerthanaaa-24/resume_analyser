<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Resume Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI';
    background: #f4f6fb;
    margin: 0;
    text-align: center;
}

.container {
    padding: 20px;
}

h1 {
    color: #2a5298;
}

.card {
    background: white;
    margin: 20px auto;
    padding: 20px;
    width: 90%;
    max-width: 650px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
    padding: 12px 18px;
    border: none;
    background: #2a5298;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.progress {
    height: 10px;
    background: #ddd;
    border-radius: 10px;
}

#progressBar {
    height: 100%;
    width: 0%;
    border-radius: 10px;
}

</style>
</head>

<body>

<div class="container">

<h1>🚀 AI Resume Analyzer</h1>

<div class="card">
    <h3>Select Role</h3>

    <select id="role">
            <option value="genai">Gen AI Engineer</option>
            <option value="datascience">Data Scientist</option>
            <option value="ml">ML Engineer</option>
            <option value="backend">Backend Developer</option>
            <option value="frontend">Frontend Developer</option>
            <option value="fullstack">Full Stack Developer</option>
            <option value="devops">DevOps Engineer</option>
            <option value="cloud">Cloud Engineer</option>
            <option value="mobile">Mobile Developer</option>
            <option value="cyber">Cybersecurity Analyst</option>
            <option value="qa">QA Engineer</option>
            <option value="uiux">UI/UX Designer</option>
        </select>


    <br><br>

    <input type="file" id="fileInput">

    <br><br>

    <button onclick="upload()">Analyze Resume</button>
</div>

<div class="card">
    <h2 id="scoreText">ATS Score: --</h2>
    <div class="progress">
        <div id="progressBar"></div>
    </div>
</div>

<div class="card">
    <h3>📊 Skill Analysis</h3>
    <canvas id="chart"></canvas>
</div>

<div class="card">
    <h3>🧠 Feedback</h3>
    <p id="feedback"></p>

    <h4>✅ Matched Skills</h4>
    <p id="matched"></p>

    <h4>❌ Missing Skills</h4>
    <p id="missing"></p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
